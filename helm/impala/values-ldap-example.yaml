# Values for the OpenLDAP chart (openldap/openldap), not the Impala chart.
# Deploy LDAP with:
#   helm install impala-ldap openldap/openldap -f values-ldap-example.yaml
# Then deploy Impala with LDAP auth using values-impala-ldap-example.yaml.

replicaCount: 1

image:
  repository: cleanstart/openldap
  tag: 2.6.13
  pullPolicy: IfNotPresent

tls:
  enabled: true

service:
  type: ClusterIP
  ldapPort: 389
  sslLdapPort: 636

env:
  LDAP_ORGANISATION: "Impala"
  LDAP_DOMAIN: "example.org"
  LDAP_TLS: "true"
  LDAP_TLS_ENFORCE: "false"
  LDAP_TLS_REQCERT: "never"
  LDAP_TLS_VERIFY_CLIENT: "never"

# Demo credentials. Override these in production.
adminPassword: "admin123"
configPassword: "admin123"

customLdifFiles:
  01-impala-user.ldif: |-
    dn: cn=impalauser,dc=example,dc=org
    objectClass: top
    objectClass: person
    objectClass: organizationalPerson
    objectClass: inetOrgPerson
    cn: impalauser
    sn: impalauser
    uid: impalauser
    userPassword: impala123

replication:
  enabled: false

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi

ltb-passwd:
  enabled: false

phpldapadmin:
  enabled: false
