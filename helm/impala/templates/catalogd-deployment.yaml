apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "impala.fullname" . }}-catalogd
  labels:
{{ include "impala.labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "impala.name" . }}
      app.kubernetes.io/component: catalogd
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: {{ include "impala.name" . }}
        app.kubernetes.io/component: catalogd
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: catalogd
          image: {{ include "impala.image" (dict "Values" .Values "imageName" "catalogd") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -redirect_stdout_stderr=false
            - -logtostderr
            - -v={{ .Values.catalogd.v }}
            - -state_store_host={{ .Values.statestore.host | default (printf "%s-statestored" (include "impala.fullname" .)) }}
            - -hms_event_polling_interval_s={{ .Values.catalogd.hmsEventPollingIntervalS }}
            - -invalidate_tables_timeout_s={{ .Values.catalogd.invalidateTablesTimeoutS }}
{{- if or .Values.impalad.kuduMasterHosts .Values.kudu.enabled }}
            - -kudu_master_hosts={{ .Values.impalad.kuduMasterHosts | default (printf "%s:%d" (include "impala.kuduMasterService" .) (.Values.kudu.master.rpcPort | int)) }}
{{- end }}
{{- if .Values.auth.ranger.enabled }}
            - -authorization_provider=ranger
            - -ranger_service_type={{ .Values.auth.ranger.serviceType }}
            - -ranger_app_id={{ .Values.auth.ranger.appId }}
            - -server_name={{ .Values.auth.ranger.serverName }}
{{- end }}
{{- range .Values.catalogd.extraArgs }}
            - {{ . | quote }}
{{- end }}
          ports:
            - name: rpc
              containerPort: 26000
            - name: web
              containerPort: 25020
          volumeMounts:
            - name: warehouse
              mountPath: /user/hive/warehouse
            - name: conf
              mountPath: /opt/impala/conf/hive-site.xml
              subPath: hive-site.xml
{{- if .Values.auth.ranger.enabled }}
            - name: conf
              mountPath: /opt/impala/conf/ranger-hive-security.xml
              subPath: ranger-hive-security.xml
            - name: conf
              mountPath: /opt/impala/conf/ranger-hive-audit.xml
              subPath: ranger-hive-audit.xml
{{- end }}
      volumes:
        - name: conf
          configMap:
            name: {{ include "impala.fullname" . }}-conf
        - name: warehouse
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "impala.fullname" . }}-warehouse
{{- else }}
          emptyDir: {}
{{- end }}
