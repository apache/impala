apiVersion: v1
kind: Service
metadata:
  name: {{ include "impala.fullname" . }}-impalad
  labels:
{{ include "impala.labels" . | indent 4 }}
{{- with .Values.service.impalad.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.impalad.type | default "ClusterIP" }}
{{- if and (eq (.Values.service.impalad.type | default "ClusterIP") "LoadBalancer") .Values.service.impalad.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.impalad.loadBalancerIP | quote }}
{{- end }}
{{- with .Values.service.impalad.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml . | indent 4 }}
{{- end }}
  ports:
    - name: hs2
      port: 21050
      targetPort: hs2
    - name: web
      port: 25000
      targetPort: web
    - name: hs2-http
      port: 28000
      targetPort: hs2-http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: {{ include "impala.name" . }}
    app.kubernetes.io/component: impalad
